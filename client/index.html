<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="文明模拟器 - Civilization Simulator - 开放世界策略游戏" />
  <meta name="keywords" content="civilization, simulator, strategy, game, 文明, 模拟器" />
  <meta name="author" content="CivSim Team" />
  <title>文明模拟器 | Civilization Simulator</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="app">
    <!-- HUD Bar (AoE4 暗色半透明顶部条) -->
    <header id="hud-bar" class="hud-bar">
      <div class="hud-logo" id="hud-logo">
        <span class="hud-logo-icon">🏛️</span>
        <div class="hud-logo-text">
          <h1 class="hud-title" data-i18n="app.title">文明模拟器</h1>
          <span class="hud-subtitle" data-i18n="app.subtitle">开放世界策略</span>
        </div>
      </div>
      <div class="hud-resources" id="hud-resources">
        <div class="hud-resource" data-resource="food">
          <span class="resource-icon">🌾</span>
          <span class="resource-label" data-i18n="hud.food">粮食</span>
          <span class="resource-value" id="res-food">0</span>
        </div>
        <div class="hud-resource" data-resource="iron">
          <span class="resource-icon">⛏️</span>
          <span class="resource-label" data-i18n="hud.iron">铁矿</span>
          <span class="resource-value" id="res-iron">0</span>
        </div>
        <div class="hud-resource" data-resource="ammo">
          <span class="resource-icon">💥</span>
          <span class="resource-label" data-i18n="hud.ammo">弹药</span>
          <span class="resource-value" id="res-ammo">0</span>
        </div>
        <div class="hud-resource" data-resource="pop">
          <span class="resource-icon">👥</span>
          <span class="resource-label" data-i18n="hud.pop">人口</span>
          <span class="resource-value" id="res-pop">0</span>
        </div>
      </div>
      <div class="hud-controls" id="hud-controls">
        <div class="hud-tick">
          <span class="tick-label" data-i18n="hud.tick">回合</span>
          <span class="tick-value" id="tick-counter">0</span>
        </div>
        <div class="hud-speed">
          <button class="speed-btn" id="btn-pause" title="暂停">⏸</button>
          <button class="speed-btn active" id="btn-play" title="正常速度">▶</button>
          <button class="speed-btn" id="btn-fast" title="快进">⏩</button>
        </div>
        <button class="hud-settings-btn" id="btn-settings" title="设置">⚙️</button>
      </div>
    </header>

    <!-- 3D Map Container (全视口) -->
    <section id="map-container" class="map-container">
      <!-- Three.js canvas 由 scene-manager.js 动态插入 -->
      <!-- Minimap -->
      <div id="minimap-container" class="minimap-container"></div>
    </section>

    <!-- Info Panel (右侧滑入，默认隐藏) -->
    <aside id="info-panel" class="info-panel">
      <div class="panel-header">
        <h2 class="panel-title" id="panel-title" data-i18n="panel.selectNode">选择一个节点</h2>
        <button class="panel-close" id="panel-close">✕</button>
      </div>
      <div class="panel-body" id="panel-body">
        <div class="panel-placeholder" id="panel-placeholder">
          <span class="placeholder-icon">🗺️</span>
          <p data-i18n="panel.placeholder">点击地图上的城市查看详情</p>
        </div>
        <div class="panel-details" id="panel-details" style="display:none;">
          <!-- Faction Badge -->
          <div class="detail-faction" id="detail-faction">
            <span class="faction-badge" id="faction-badge">—</span>
          </div>
          <!-- City Overview -->
          <div class="detail-section">
            <h3 class="detail-heading" data-i18n="panel.cityOverview">城市概览</h3>
            <div class="detail-city-info" id="detail-city-info"></div>
          </div>
          <!-- Population -->
          <div class="detail-section">
            <h3 class="detail-heading" data-i18n="panel.population">人口</h3>
            <div class="detail-value" id="detail-pop">0</div>
          </div>
          <!-- Resources -->
          <div class="detail-section">
            <h3 class="detail-heading" data-i18n="panel.resources">资源</h3>
            <div class="detail-resources" id="detail-resources">
              <div class="detail-res-row">
                <span>🌾 <span data-i18n="hud.food">粮食</span></span>
                <span id="detail-food">0</span>
              </div>
              <div class="detail-res-row">
                <span>⛏️ <span data-i18n="hud.iron">铁矿</span></span>
                <span id="detail-iron">0</span>
              </div>
              <div class="detail-res-row">
                <span>💥 <span data-i18n="hud.ammo">弹药</span></span>
                <span id="detail-ammo">0</span>
              </div>
            </div>
          </div>
          <!-- Buildings -->
          <div class="detail-section">
            <h3 class="detail-heading" data-i18n="panel.buildings">建筑</h3>
            <div class="detail-buildings" id="detail-buildings"></div>
          </div>
          <!-- Actions -->
          <div class="detail-section">
            <h3 class="detail-heading" data-i18n="panel.actions">操作</h3>
            <div class="detail-actions" id="detail-actions">
              <button class="action-btn action-btn-danger" id="btn-attack" disabled data-i18n="panel.attack">进攻</button>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Action Bar (AoE4 底部操作条) -->
    <footer id="action-bar" class="action-bar">
      <button class="action-bar-btn" id="btn-build" title="建造 (B)">
        <span class="action-bar-icon">🔨</span>
        <span class="action-bar-label" data-i18n="action.build">建造</span>
      </button>
      <button class="action-bar-btn" id="btn-wall" title="城墙 (W)">
        <span class="action-bar-icon">🧱</span>
        <span class="action-bar-label" data-i18n="action.wall">城墙</span>
      </button>
      <button class="action-bar-btn" id="btn-logistics" title="物流 (L)">
        <span class="action-bar-icon">📦</span>
        <span class="action-bar-label" data-i18n="action.logistics">物流</span>
      </button>
      <button class="action-bar-btn" id="btn-research" title="研究 (T)">
        <span class="action-bar-icon">🔬</span>
        <span class="action-bar-label" data-i18n="action.research">研究</span>
      </button>
      <button class="action-bar-btn" id="btn-log-toggle" title="日志 (J)">
        <span class="action-bar-icon">📜</span>
        <span class="action-bar-label" data-i18n="action.log">日志</span>
      </button>
    </footer>

    <!-- Battle Log (可折叠，默认隐藏) -->
    <div id="battle-log" class="battle-log" style="display:none;">
      <div class="log-header">
        <span class="log-title" data-i18n="log.title">📜 事件日志</span>
      </div>
      <div class="log-entries" id="log-entries">
        <div class="log-entry log-info">
          <span class="log-time">[00:00]</span>
          <span class="log-msg" data-i18n="log.welcome">系统初始化完成</span>
        </div>
      </div>
    </div>

    <!-- Settings Panel (hidden by default) -->
    <div class="settings-overlay" id="settings-overlay" style="display:none;">
      <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
          <h2 data-i18n="settings.title">⚙️ 设置</h2>
          <button class="settings-close" id="settings-close">✕</button>
        </div>
        <div class="settings-body">
          <div class="settings-row">
            <span class="settings-label" data-i18n="settings.language">语言</span>
            <div class="language-toggle" id="language-toggle">
              <button class="lang-btn active" data-lang="zh-CN">中文</button>
              <button class="lang-btn" data-lang="en-US">English</button>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label" data-i18n="settings.connection">连接状态</span>
            <span class="connection-status" id="connection-status">
              <span class="status-dot offline"></span>
              <span data-i18n="settings.offline">离线</span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
